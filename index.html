<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史指數互動式 K 線圖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-y: auto;
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 10px 20px;
            background: linear-gradient(180deg, #1e1e1e 0%, #151515 100%);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            color: #e0e0e0;
        }

        .controls select {
            padding: 6px 14px;
            background-color: #2b2b2b;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .controls select:hover {
            background-color: #383838;
            border-color: #555;
        }

        #indicators-panel {
            background: #161625;
            border-bottom: 1px solid #2a2a3e;
            padding: 6px 20px;
            overflow-x: auto;
        }

        .indicators-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 680px;
        }

        .indicators-table th {
            background: #1e1e35;
            color: #666;
            padding: 4px 10px;
            text-align: center;
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2a3e;
        }

        .indicators-table td {
            padding: 4px 10px;
            text-align: center;
            border-bottom: 1px solid #1e1e30;
            vertical-align: middle;
        }

        .indicators-table tr:last-child td { border-bottom: none; }
        .indicators-table tr:hover td { background: rgba(255,255,255,0.02); }

        .ind-name {
            text-align: left !important;
            white-space: nowrap;
            font-weight: 600;
            font-size: 12px;
        }

        .ind-value {
            font-size: 15px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 55px;
        }

        .ind-rule {
            color: #666;
            font-size: 11px;
            text-align: left !important;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-red    { background: rgba(239,68,68,0.18);  color: #f87171; border: 1px solid rgba(239,68,68,0.35); }
        .badge-green  { background: rgba(16,185,129,0.18); color: #34d399; border: 1px solid rgba(16,185,129,0.35); }
        .badge-yellow { background: rgba(245,158,11,0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.35); }
        .badge-gray   { background: rgba(107,114,128,0.18);color: #9ca3af; border: 1px solid rgba(107,114,128,0.35); }

        #chart-container {
            width: 100%;
            height: max(560px, calc(100vh - 185px));
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(18, 18, 18, 0.88);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #2563eb;
            z-index: 100;
            font-weight: 600;
            letter-spacing: 2px;
            flex-direction: column;
            gap: 8px;
        }

        #loading small {
            font-size: 12px;
            color: #888;
            font-weight: 400;
            letter-spacing: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>

<body>
    <div id="app">
        <header>
            <h1>歷史指數互動式看板</h1>

            <div class="controls">
                <select id="marketSelector">
                    <option value="twii">台灣加權指數 (^TWII)</option>
                    <option value="nasdaq">那斯達克綜合指數 (^IXIC)</option>
                </select>
            </div>
        </header>
        <div id="indicators-panel">
            <div style="padding:3px 0 5px 0; font-size:11px; color:#555; display:flex; align-items:center; gap:14px;">
                <span>日期：<span id="panel-date" style="color:#aaa; font-weight:700; font-size:12px; font-variant-numeric:tabular-nums;">載入中...</span></span>
                <span style="color:#3a3a55; font-size:10px;">← 點選 K 線棒可查看當日數值</span>
            </div>
            <table class="indicators-table">
                <thead>
                    <tr>
                        <th style="text-align:left">指標</th>
                        <th id="th-value">數值</th>
                        <th style="text-align:left">訊號門檻 / 解讀</th>
                        <th>狀態</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="ind-name" style="color:#ef4444">恐慌指數 (Panic)</td>
                        <td class="ind-value" id="val-panic">--</td>
                        <td class="ind-rule">&gt;50 = 恐慌區域 ｜ 從高點回落 = <strong style="color:#34d399">最佳買點</strong></td>
                        <td id="badge-panic"><span class="badge badge-gray">--</span></td>
                    </tr>
                    <tr>
                        <td class="ind-name" style="color:#10b981">貪婪指數 (Greed)</td>
                        <td class="ind-value" id="val-greed">--</td>
                        <td class="ind-rule">&lt;25 = 恐懼區域 ｜ 觸底回升 = <strong style="color:#34d399">買入確認</strong></td>
                        <td id="badge-greed"><span class="badge badge-gray">--</span></td>
                    </tr>
                    <tr>
                        <td class="ind-name" style="color:#f59e0b">VIX 恐慌指數</td>
                        <td class="ind-value" id="val-vix">--</td>
                        <td class="ind-rule">低點飆高再下降 = 恐慌觸發 → 緩解的標準模式</td>
                        <td id="badge-vix"><span class="badge badge-gray">--</span></td>
                    </tr>
                    <tr>
                        <td class="ind-name" style="color:#3b82f6">RSI (60日)</td>
                        <td class="ind-value" id="val-rsi">--</td>
                        <td class="ind-rule">低點不見得 &lt;30，歷史低點均值約 <strong style="color:#fbbf24">43–45</strong></td>
                        <td id="badge-rsi"><span class="badge badge-gray">--</span></td>
                    </tr>
                    <tr>
                        <td class="ind-name" style="color:#22d3ee">ADL 資金流向 (z)</td>
                        <td class="ind-value" id="val-adl">--</td>
                        <td class="ind-rule">負值 = 資金流出 ｜ 多頭背離時 = <strong style="color:#34d399">強烈買訊</strong></td>
                        <td id="badge-adl"><span class="badge badge-gray">--</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="chart-container"></div>
    </div>
    <div id="loading">
        <span>載入資料中，請稍候...</span>
        <small>首次計算新指標需要數秒</small>
    </div>

    <script>
        const chartDom = document.getElementById('chart-container');
        const myChart = echarts.init(chartDom, 'dark', { renderer: 'canvas' });

        // 數據由 Python 端注入
        const _DATA = { twii: [], nasdaq: [] };

        const upColor = '#ec0000', upBorderColor = '#8A0000';
        const downColor = '#00da3c', downBorderColor = '#008F28';

        // ─── 資料解析 ──────────────────────────────────────────────────────────────
        function splitData(rawData) {
            let categoryData = [], values = [], vixData = [], rsiData = [], adlRaw = [];
            for (let i = 0; i < rawData.length; i++) {
                const item = rawData[i];
                categoryData.push(item[0]);
                values.push([item[1], item[2], item[3], item[4]]);
                vixData.push(item[6]);
                rsiData.push(item[7]);
                adlRaw.push(item[8] != null ? item[8] : 0);
            }
            return { categoryData, values, vixData, rsiData, adlRaw };
        }

        // ─── 移動平均 ──────────────────────────────────────────────────────────────
        function calculateMA(dayCount, data) {
            let result = [];
            for (let i = 0, len = data.length; i < len; i++) {
                if (i < dayCount - 1) { result.push('-'); continue; }
                let sum = 0;
                for (let j = 0; j < dayCount; j++) sum += data[i - j][1];
                result.push((sum / dayCount).toFixed(2));
            }
            return result;
        }

        // ─── 領先預測指標：恐慌抄底大頭針 (基於 VIX/RSI 恐慌指數) ─────────────────────────
        function getPredictiveBottoms(chartData, panicScores) {
            let points = [];
            for (let i = 120; i < chartData.values.length; i++) {
                let score = parseFloat(panicScores[i]);
                let prevScore = parseFloat(panicScores[i - 1]);
                let low = chartData.values[i][2];

                // 尋找「恐慌轉折點」：昨天的分數突破警戒線，且今天分數開始下降（確認恐慌疲勞）
                if (prevScore > 35 && score < prevScore) {
                    // 確保 10 天內不重複標示
                    if (points.length === 0 || i - points[points.length - 1].index > 10) {

                        if (prevScore > 90) {
                            points.push({
                                name: '百年鑽石底', coord: [chartData.categoryData[i], low], value: '終極大底',
                                index: i, symbol: 'pin', symbolSize: 55, symbolRotate: 180, symbolOffset: [0, -10],
                                itemStyle: { color: '#fbbf24' }, label: { fontSize: 10, color: '#000', fontWeight: 'bold' }
                            });
                        } else if (prevScore > 50) {
                            points.push({
                                name: '一般股災底', coord: [chartData.categoryData[i], low], value: '恐慌反轉',
                                index: i, symbol: 'pin', symbolSize: 40, symbolRotate: 180, symbolOffset: [0, -10],
                                itemStyle: { color: '#ef4444' }, label: { fontSize: 9, color: '#fff', fontWeight: 'bold' }
                            });
                        } else {
                            // 新增：抓出小波段跌幅 (Panic Score > 35)
                            points.push({
                                name: '短線超跌底', coord: [chartData.categoryData[i], low], value: '小幅修正',
                                index: i, symbol: 'pin', symbolSize: 25, symbolRotate: 180, symbolOffset: [0, -10],
                                itemStyle: { color: '#f97316' }, label: { fontSize: 8, color: '#fff', fontWeight: 'bold' } // 橘色
                            });
                        }
                    }
                }
            }
            return points;
        }

        // ─── 計算動態共振支撐線 ────────────────────────────────────────────────────────
        function getDynamicSupports(chartData, ma240Data) {
            let supportHigh = [];
            let supportMA = [];
            for (let i = 0; i < chartData.values.length; i++) {
                if (i < 120) {
                    supportHigh.push('-');
                    supportMA.push('-');
                    continue;
                }
                let recentHigh = 0;
                for (let j = i - 120; j <= i; j++) {
                    if (chartData.values[j][3] > recentHigh) recentHigh = chartData.values[j][3];
                }
                let ma240 = parseFloat(ma240Data[i]);

                supportHigh.push((recentHigh * 0.88).toFixed(2)); // 波段回檔 12%
                if (!isNaN(ma240)) {
                    supportMA.push((ma240 * 0.88).toFixed(2)); // 年線負乖離 12%
                } else {
                    supportMA.push('-');
                }
            }
            return { supportHigh, supportMA };
        }

        // ─── 綜合恐慌抄底指數 (VIX / RSI 正規化) ────────────────────────────────────────────────────────
        function calculatePanicScore(chartData, ma60Data, ma240Data) {
            let scores = [];
            for (let i = 0; i < chartData.values.length; i++) {
                if (i < 120) { scores.push('-'); continue; }
                let rsi = chartData.rsiData[i];
                let vix = chartData.vixData[i];
                if (rsi === 0) rsi = 1;
                let ratio = vix / rsi;
                let score = ratio * 60;
                score = Math.max(0, score);
                scores.push(score.toFixed(1));
            }
            return scores;
        }

        // ─── 貪婪逃頂指數 (RSI / VIX 正規化) ────────────────────────────────────────────────────────
        function calculateGreedScore(chartData) {
            let scores = [];
            for (let i = 0; i < chartData.values.length; i++) {
                if (i < 120) { scores.push('-'); continue; }
                let rsi = chartData.rsiData[i];
                let vix = chartData.vixData[i];
                if (vix === 0) vix = 1; // 避免除以零

                // 市場自滿指數：動能極高 / 恐慌極低
                let ratio = rsi / vix;

                // 根據回測，歷史前 1% 的比值為 6.0。
                // 乘以 15，可以讓 6.0 的極端自滿點對應到 90 分。
                let score = ratio * 15;
                score = Math.max(0, score);
                scores.push(score.toFixed(1));
            }
            return scores;
        }

        // ─── ADL z-score 正規化 (60日滾動) ────────────────────────────────────────
        function normalizeADL(adlRaw, window = 60) {
            let result = [];
            for (let i = 0; i < adlRaw.length; i++) {
                if (i < window) { result.push('-'); continue; }
                let slice = adlRaw.slice(i - window + 1, i + 1);
                let mean = slice.reduce((a, b) => a + b, 0) / slice.length;
                let variance = slice.reduce((a, b) => a + (b - mean) ** 2, 0) / slice.length;
                let std = Math.sqrt(variance);
                result.push(std < 1e-8 ? 0 : +((adlRaw[i] - mean) / std).toFixed(2));
            }
            return result;
        }

        // ─── Price-based PCR (收盤位置比) 10日平滑 ────────────────────────────────
        // 值 > 2.0 = 賣壓主導（恐慌/底部訊號），值 < 0.4 = 買盤主導（自滿/頂部訊號）
        function calculatePricePCR(chartData, smoothWindow = 10) {
            let raw = chartData.values.map(v => {
                let close = v[1], low = v[2], high = v[3];
                let hlRange = high - low;
                if (hlRange < 1e-8) return 1.0; // 無波動日視為中性
                let bear = Math.max(0, high - close);
                let bull = Math.max(hlRange * 0.01, close - low); // 下界至少 1% 日波幅
                return Math.min(bear / bull, 8); // 上限 8，防止極端值
            });
            let result = [];
            for (let i = 0; i < raw.length; i++) {
                if (i < smoothWindow - 1) { result.push('-'); continue; }
                let sum = 0;
                for (let j = i - smoothWindow + 1; j <= i; j++) sum += raw[j];
                result.push(+(sum / smoothWindow).toFixed(2));
            }
            return result;
        }

        // ─── ADL 背離偵測（波段高低點訊號）────────────────────────────────────────
        function getADLDivergenceSignals(chartData, adlNorm) {
            const LOOKBACK = 30, MIN_GAP = 12, PRICE_THR = 0.02, ADL_THR = 0.5;
            let bottoms = [], tops = [];
            for (let i = LOOKBACK * 2; i < chartData.values.length; i++) {
                if (adlNorm[i] === '-') continue;
                let curADL = adlNorm[i];
                let curLow = chartData.values[i][2];
                let curHigh = chartData.values[i][3];
                let minLow = Infinity, minIdx = -1, maxHigh = -Infinity, maxIdx = -1;
                for (let j = i - LOOKBACK; j < i - 5; j++) {
                    if (chartData.values[j][2] < minLow) { minLow = chartData.values[j][2]; minIdx = j; }
                    if (chartData.values[j][3] > maxHigh) { maxHigh = chartData.values[j][3]; maxIdx = j; }
                }
                // 多頭背離：價格創新低，ADL 未創新低
                if (minIdx >= 0 && curLow < minLow * (1 - PRICE_THR) && adlNorm[minIdx] !== '-') {
                    if (curADL > adlNorm[minIdx] + ADL_THR) {
                        if (bottoms.length === 0 || i - bottoms[bottoms.length - 1].index >= MIN_GAP)
                            bottoms.push({ index: i, date: chartData.categoryData[i], price: curLow });
                    }
                }
                // 空頭背離：價格創新高，ADL 未創新高
                if (maxIdx >= 0 && curHigh > maxHigh * (1 + PRICE_THR) && adlNorm[maxIdx] !== '-') {
                    if (curADL < adlNorm[maxIdx] - ADL_THR) {
                        if (tops.length === 0 || i - tops[tops.length - 1].index >= MIN_GAP)
                            tops.push({ index: i, date: chartData.categoryData[i], price: curHigh });
                    }
                }
            }
            return { bottoms, tops };
        }

        // ─── 指標面板更新（idx 預設最後一筆；點選 K 棒時傳入指定索引）────────────────
        function updateIndicatorsPanel(chartData, panicScores, greedScores, adlNorm, idx) {
            const last = chartData.values.length - 1;
            const n    = (idx !== undefined && idx >= 1) ? idx : last;
            if (n < 1) return;

            const isLatest = (n === last);
            const date = chartData.categoryData[n];
            document.getElementById('panel-date').textContent = isLatest ? date + '（今日）' : date;

            const panic     = parseFloat(panicScores[n]);
            const prevPanic = parseFloat(panicScores[n - 1]);
            const greed     = parseFloat(greedScores[n]);
            const prevGreed = parseFloat(greedScores[n - 1]);
            const vix       = chartData.vixData[n];
            const prevVix   = chartData.vixData[Math.max(0, n - 5)];
            const rsi       = chartData.rsiData[n];
            const adl       = (adlNorm[n] !== '-' && adlNorm[n] !== undefined) ? parseFloat(adlNorm[n]) : null;

            function setBadge(id, cls, text) {
                document.getElementById(id).innerHTML = `<span class="badge badge-${cls}">${text}</span>`;
            }
            function setVal(id, val, color) {
                const el = document.getElementById(id);
                el.textContent = val;
                el.style.color = color;
            }

            // Panic
            if (!isNaN(panic)) {
                setVal('val-panic', panic.toFixed(1), panic > 50 ? '#f87171' : panic > 25 ? '#fbbf24' : '#9ca3af');
                if (panic > 90)              setBadge('badge-panic', 'red',    '百年黑天鵝');
                else if (panic > 50)         setBadge('badge-panic', 'red',    '⚠ 恐慌區域');
                else if (prevPanic > 50 && panic < prevPanic)
                                             setBadge('badge-panic', 'green',  '✓ 回落買點');
                else if (panic > 25)         setBadge('badge-panic', 'yellow', '警戒');
                else                         setBadge('badge-panic', 'gray',   '正常');
            }

            // Greed
            if (!isNaN(greed)) {
                setVal('val-greed', greed.toFixed(1), greed > 70 ? '#f87171' : greed < 25 ? '#34d399' : '#9ca3af');
                if (greed > 90)              setBadge('badge-greed', 'red',    '極度貪婪');
                else if (greed > 70)         setBadge('badge-greed', 'red',    '⚠ 高點警戒');
                else if (greed < 25 && greed > prevGreed)
                                             setBadge('badge-greed', 'green',  '✓ 回升確認');
                else if (greed < 25)         setBadge('badge-greed', 'yellow', '恐懼區域');
                else                         setBadge('badge-greed', 'gray',   '正常');
            }

            // VIX
            if (!isNaN(vix)) {
                setVal('val-vix', vix.toFixed(2), vix > 30 ? '#f87171' : vix > 20 ? '#fbbf24' : '#9ca3af');
                if (vix > 40)                    setBadge('badge-vix', 'red',    '⚠ 極度恐慌');
                else if (vix > 30)               setBadge('badge-vix', 'red',    '恐慌');
                else if (prevVix > 25 && vix < prevVix * 0.9)
                                                 setBadge('badge-vix', 'green',  '✓ 恐慌緩解');
                else if (vix > 20)               setBadge('badge-vix', 'yellow', '警戒');
                else                             setBadge('badge-vix', 'gray',   '低恐慌');
            }

            // RSI
            if (!isNaN(rsi)) {
                const rsiC = rsi < 40 ? '#f87171' : rsi <= 50 ? '#fbbf24' : rsi > 60 ? '#34d399' : '#9ca3af';
                setVal('val-rsi', rsi.toFixed(1), rsiC);
                if (rsi < 40)            setBadge('badge-rsi', 'red',    '超跌');
                else if (rsi <= 50)      setBadge('badge-rsi', 'yellow', '低點區間 (43-45)');
                else if (rsi > 65)       setBadge('badge-rsi', 'green',  '強勢');
                else                     setBadge('badge-rsi', 'gray',   '中性');
            }

            // ADL z-score
            if (adl !== null) {
                const adlC = adl < -1.5 ? '#f87171' : adl < 0 ? '#fbbf24' : adl > 1.5 ? '#34d399' : '#9ca3af';
                setVal('val-adl', adl.toFixed(2), adlC);
                if (adl < -1.5)      setBadge('badge-adl', 'red',    '⚠ 資金嚴重流出');
                else if (adl < 0)    setBadge('badge-adl', 'yellow', '資金流出');
                else if (adl > 1.5)  setBadge('badge-adl', 'green',  '資金強流入');
                else                 setBadge('badge-adl', 'gray',   '資金中性');
            }
        }

        // ─── 主繪圖函數 ────────────────────────────────────────────────────────────
        function renderChart(data, titleText) {
            const chartData = splitData(data);
            const ma60Data = calculateMA(60, chartData.values);
            const ma240Data = calculateMA(240, chartData.values);

            // 動態支撐線與情緒指數
            const dynamicSupports = getDynamicSupports(chartData, ma240Data);
            const panicScores = calculatePanicScore(chartData, ma60Data, ma240Data);
            const greedScores = calculateGreedScore(chartData);

            // ADL 指標
            const adlNorm = normalizeADL(chartData.adlRaw, 60);
            const pcrData = calculatePricePCR(chartData, 10);
            const adlDiv = getADLDivergenceSignals(chartData, adlNorm);

            // K線標示：恐慌反轉點 + ADL多頭背離
            const predictiveBottoms = getPredictiveBottoms(chartData, panicScores);
            const adlBottomMarks = adlDiv.bottoms.map(s => ({

        async function loadData(market) {

            try {
                const titles = { twii: '台灣加權指數 (^TWII)', nasdaq: '那斯達克指數 (^IXIC)' };
                renderChart(_DATA[market], titles[market]);
            } catch (error) {
                console.error('Error loading data:', error);
                alert("數據載入失敗，請重新整理頁面。");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        window.addEventListener('resize', () => { myChart.resize(); });
        document.getElementById('marketSelector').addEventListener('change', (e) => { loadData(e.target.value); });
        loadData('twii');
